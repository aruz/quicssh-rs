version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor
    # toml 1.x may change syntax; park until a dedicated migration PR.
    ignore:
      - dependency-name: toml
        update-types: [version-update:semver-major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
