version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor
    # Majors on these require coordinated migration (quinn/rustls/rcgen are
    # tightly coupled; toml 1.x may change syntax). Unblock by deleting the
    # relevant entry when the migration is planned.
    ignore:
      - dependency-name: quinn
        update-types: [version-update:semver-major]
      - dependency-name: rustls
        update-types: [version-update:semver-major]
      - dependency-name: rcgen
        update-types: [version-update:semver-major]
      - dependency-name: toml
        update-types: [version-update:semver-major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
