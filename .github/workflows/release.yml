name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.suffix }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            suffix: Linux-x86_64-musl
            method: cross
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            suffix: Linux-aarch64-musl
            method: cross
          - target: aarch64-apple-darwin
            runner: macos-latest
            suffix: Darwin-aarch64
            method: native
          - target: x86_64-apple-darwin
            runner: macos-13
            suffix: Darwin-x86_64
            method: native
    steps:
      - uses: actions/checkout@v6

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install native toolchain
        if: matrix.method == 'native'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build (native)
        if: matrix.method == 'native'
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.method == 'cross'
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: --locked --release
          strip: true

      - name: Package tarball
        run: |
          tarball="quicssh-rs-${{ matrix.suffix }}.tar.gz"
          tar -C target/${{ matrix.target }}/release -czf "$tarball" quicssh-rs
          shasum -a 256 "$tarball" > "${tarball}.sha256"

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            quicssh-rs-${{ matrix.suffix }}.tar.gz
            quicssh-rs-${{ matrix.suffix }}.tar.gz.sha256
