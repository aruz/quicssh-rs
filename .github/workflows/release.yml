name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v6

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: --locked --release
          strip: true

      - name: Package tarball
        run: |
          arch=$(echo '${{ matrix.target }}' | cut -d- -f1)
          tarball="quicssh-rs-Linux-${arch}-musl.tar.gz"
          tar -C target/${{ matrix.target }}/release -czf "$tarball" quicssh-rs
          sha256sum "$tarball" > "${tarball}.sha256"

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            quicssh-rs-Linux-*-musl.tar.gz
            quicssh-rs-Linux-*-musl.tar.gz.sha256
